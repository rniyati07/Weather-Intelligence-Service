[importlinter]
root_package = app
include_external_packages = True

[importlinter:contract:layers]
name = Clean Architecture layers
type = layers
layers =
    app.interface
    app.application
    app.domain

[importlinter:contract:domain-purity]
name = Domain imports no infrastructure or framework
type = forbidden
source_modules =
    app.domain
forbidden_modules =
    app.infrastructure
    app.interface
    fastapi
    sqlalchemy
    redis
    httpx
